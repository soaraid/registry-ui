services:
  registry-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: soaraid/registry-ui:local
    container_name: soara-registry-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      REGISTRY_URL: ${REGISTRY_URL}
      REGISTRY_USERNAME: ${REGISTRY_USERNAME:-}
      REGISTRY_PASSWORD: ${REGISTRY_PASSWORD:-}
      REGISTRY_BEARER_TOKEN: ${REGISTRY_BEARER_TOKEN:-}
      APP_AUTH_USERNAME: ${APP_AUTH_USERNAME:-operator}
      APP_AUTH_PASSWORD: ${APP_AUTH_PASSWORD:-change-me}
      APP_SESSION_SECRET: ${APP_SESSION_SECRET:-replace-with-a-long-random-secret}
      APP_BRAND_NAME: ${APP_BRAND_NAME:-Soara}
      APP_PRODUCT_NAME: ${APP_PRODUCT_NAME:-Registry UI}
